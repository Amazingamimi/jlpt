<script>

let words = [];

async function loadWords() {
  const url = "https://docs.google.com/spreadsheets/d/1CShs1cYgtX6yRyNtR6ukF4D7wG5roNjQk69-lxh1U80/export?format=csv";

  try {
    const res = await fetch(url);
    const text = await res.text();

    console.log("CSV 原始資料：", text);

    words = text.split("\n").slice(1).map(row => {
      const [level, word, reading, meaning] = row.split(",");
      return { level, word, reading, meaning };
    });

    console.log("解析後 words：", words);

    nextQuestion();

  } catch (err) {
    console.error("❌ 讀取失敗：", err);
    document.body.innerHTML = "<h2>❌ Google Sheet 讀取失敗</h2>";
  }
}

function nextQuestion() {
  if (!words.length) return;

  const word = words[Math.floor(Math.random() * words.length)];

  document.body.innerHTML = `
    <h2>${word.word}</h2>
    <p>${word.meaning}</p>
  `;
}

loadWords();

</script>
