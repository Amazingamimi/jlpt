<body>

<h1>JLPT 測驗</h1>

<h2 id="question"></h2>
<div id="choices"></div>
<p id="result"></p>
  
<button onclick="nextQuestion()">下一題</button>

<script>

let words = [];
let currentAnswer = "";

function shuffle(arr) {
  return arr.sort(() => Math.random() - 0.5);
}

async function loadWords() {
  const url = "https://docs.google.com/spreadsheets/d/1CShs1cYgtX6yRyNtR6ukF4D7wG5roNjQk69-lxh1U80/export?format=csv";

  const res = await fetch(url);
  const text = await res.text();

  words = text
    .split("\n")
    .map(r => r.trim())
    .filter(r => r && r.includes(","))
    .map(row => {
      const cols = row.split(",");
      return {
        word: cols[1],
        reading: cols[2],
        meaning: cols[3]
      };
    })
    .filter(w => w.word);

  nextQuestion();
}

function nextQuestion() {

  const q = document.getElementById("question");
  const c = document.getElementById("choices");
  const r = document.getElementById("result");

  if (!q || !c || !r) {
    console.error("❌ HTML元素不存在");
    return;
  }

  r.innerText = "";

  const word = words[Math.floor(Math.random() * words.length)];

  const options = shuffle([
    word.meaning,
    "錯誤1",
    "錯誤2",
    "錯誤3"
  ]);

  currentAnswer = word.meaning;

  q.innerText = word.word;

  c.innerHTML = "";

  options.forEach(opt => {
    const btn = document.createElement("button");
    btn.innerText = opt;
    btn.onclick = () => {
      r.innerText = opt === currentAnswer ? "✅ 正確" : "❌ 錯誤";
    };
    c.appendChild(btn);
  });
}

loadWords();

</script>

</body>
