<body>

<h1>JLPT 測驗</h1>

<h2 id="question"></h2>
<div id="choices"></div>
<p id="result"></p>
  
<button onclick="nextQuestion()">下一題</button>

<script>

let words = [];
let currentAnswer = "";

// =========================
// 工具：洗牌 + 清理
// =========================

function shuffle(arr) {
  return arr
    .filter(v => v && v !== "undefined" && !v.includes("錯誤"))
    .sort(() => Math.random() - 0.5);
}

// =========================
// 讀 Google Sheets
// =========================

async function loadWords() {

  const url =
    "https://script.google.com/macros/s/AKfycbxPuM3XvrI_c139OQEj5ZVYZLJ7nlT9hOOBcSyHQLuZyRT3a0S3Gji3uDIW1mUyLaRF/exec";

  try {

    const res = await fetch(url);
    const data = await res.json();

    words = data.filter(w =>
      w.word && w.reading && w.meaning
    );

    console.log("loaded:", words);

    nextQuestion();

  } catch (err) {

    console.error(err);

    document.body.innerHTML =
      "<h2>❌ 載入失敗</h2><pre>" + err.message + "</pre>";
  }
}

// =========================
// 出題
// =========================

function nextQuestion() {

  const qEl = document.getElementById("question");
  const cEl = document.getElementById("choices");
  const rEl = document.getElementById("result");

  if (!qEl || !cEl || !rEl) {
    console.error("❌ DOM不存在");
    return;
  }

  rEl.innerText = "";

  const word = words[Math.floor(Math.random() * words.length)];

  const type = Math.floor(Math.random() * 3);

  let question = "";
  let correct = "";
  let pool = [];

  // =========================
  // 題型
  // =========================

  if (type === 0) {
    question = word.word;
    correct = word.meaning;
    pool = words.map(w => w.meaning);
  }

  else if (type === 1) {
    question = word.word;
    correct = word.reading;
    pool = words.map(w => w.reading);
  }

  else {
    question = word.reading;
    correct = word.word;
    pool = words.map(w => w.word);
  }

  // =========================
  // 選項處理（防污染）
  // =========================

  let options = shuffle(pool).slice(0, 4);

  if (!options.includes(correct)) {
    options[0] = correct;
  }

  options = shuffle(options);

  currentAnswer = correct;

  // =========================
  // 顯示
  // =========================

  qEl.innerText = question;
  cEl.innerHTML = "";

  options.forEach(opt => {
    const btn = document.createElement("button");

    btn.innerText = opt;

    btn.onclick = () => {
      rEl.innerText =
        opt === currentAnswer
          ? "✅ 正確"
          : "❌ 錯誤：" + currentAnswer;
    };

    cEl.appendChild(btn);
  });
}

// =========================
// 啟動
// =========================

loadWords();

</script>
</body>
