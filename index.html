<body>

<h1>JLPT 測驗</h1>

<h2 id="question"></h2>
<div id="choices"></div>
<p id="result"></p>
  
<button onclick="nextQuestion()">下一題</button>

<script>

let words = [];
let currentAnswer = "";

// -------------------- 工具 --------------------

function shuffle(arr) {
  return arr
    .filter(v => v) // 去掉空值
    .sort(() => Math.random() - 0.5);
}

// -------------------- 讀 Google Sheets --------------------

async function loadWords() {
  try {

    const url =
      "https://docs.google.com/spreadsheets/d/1CShs1cYgtX6yRyNtR6ukF4D7wG5roNjQk69-lxh1U80/export?format=csv";

    const res = await fetch(url);

    if (!res.ok) throw new Error("HTTP錯誤：" + res.status);

    const text = await res.text();

    words = text
      .split("\n")
      .map(r => r.trim())
      .filter(r => r && r.includes(",")) // 去空行

      .map(row => {
        const cols = row.split(",");

        return {
          level: cols[0]?.trim(),
          word: cols[1]?.trim(),
          reading: cols[2]?.trim(),
          meaning: cols[3]?.trim()
        };
      })

      .filter(w =>
        w.word && w.reading && w.meaning
      );

    console.log("words loaded:", words);

    if (!words.length) throw new Error("資料為空");

    nextQuestion();

  } catch (err) {
    console.error(err);
    document.body.innerHTML =
      "<h2>❌ 載入失敗</h2><pre>" + err.message + "</pre>";
  }
}

// -------------------- 出題 --------------------

function nextQuestion() {

  const qEl = document.getElementById("question");
  const cEl = document.getElementById("choices");
  const rEl = document.getElementById("result");

  if (!qEl || !cEl || !rEl) {
    console.error("❌ DOM不存在");
    return;
  }

  rEl.innerText = "";

  const word = words[Math.floor(Math.random() * words.length)];

  const type = Math.floor(Math.random() * 3);

  let question = "";
  let correct = "";
  let pool = [];

  // ---------------- 題型 ----------------

  if (type === 0) {
    question = word.word;
    correct = word.meaning;
    pool = words.map(w => w.meaning);
  }

  else if (type === 1) {
    question = word.word;
    correct = word.reading;
    pool = words.map(w => w.reading);
  }

  else {
    question = word.reading;
    correct = word.word;
    pool = words.map(w => w.word);
  }

  // ---------------- 選項處理 ----------------

  let options = shuffle(pool).slice(0, 4);

  if (!options.includes(correct)) {
    options[0] = correct;
  }

  options = shuffle(options);

  currentAnswer = correct;

  // ---------------- 顯示 ----------------

  qEl.innerText = question;
  cEl.innerHTML = "";

  options.forEach(opt => {
    const btn = document.createElement("button");

    btn.innerText = opt;

    btn.onclick = () => {
      rEl.innerText =
        opt === currentAnswer ? "✅ 正確" : "❌ 錯誤：" + currentAnswer;
    };

    cEl.appendChild(btn);
  });
}

// -------------------- 啟動 --------------------

loadWords();

</script>

</body>
