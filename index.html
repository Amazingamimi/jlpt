<body>

<h1>JLPT 測驗</h1>

<h2 id="question"></h2>
<div id="choices"></div>
<p id="result"></p>
  
<button onclick="nextQuestion()">下一題</button>

<script>

let words = [];
let currentAnswer = "";

// =========================
// 洗牌（安全版）
// =========================
function shuffle(arr) {
  return arr
    .filter(v => v && v !== "undefined")
    .sort(() => Math.random() - 0.5);
}

// =========================
// 載入 API
// =========================
async function loadWords() {

  const url =
    "https://script.google.com/macros/s/AKfycbxPuM3XvrI_c139OQEj5ZVYZLJ7nlT9hOOBcSyHQLuZyRT3a0S3Gji3uDIW1mUyLaRF/exec";

  try {

    const res = await fetch(url);

    if (!res.ok) {
      throw new Error("HTTP錯誤：" + res.status);
    }

    const data = await res.json();

    // 🚨 API錯誤檢查
    if (data.error) {
      throw new Error(data.message);
    }

    words = data.filter(w =>
      w.word && w.reading && w.meaning
    );

    console.log("✅ words loaded:", words);

    if (!words.length) {
      throw new Error("題庫是空的");
    }

    nextQuestion();

  } catch (err) {

    console.error("❌ loadWords error:", err);

    document.body.innerHTML = `
      <h2>❌ 載入失敗</h2>
      <pre>${err.message}</pre>
    `;
  }
}

// =========================
// 出題
// =========================
function nextQuestion() {

  const q = document.getElementById("question");
  const c = document.getElementById("choices");
  const r = document.getElementById("result");

  if (!q || !c || !r) {
    console.error("❌ HTML缺少必要元素");
    return;
  }

  r.innerText = "";

  const word = words[Math.floor(Math.random() * words.length)];

  const type = Math.floor(Math.random() * 3);

  let question = "";
  let correct = "";
  let pool = [];

  // =========================
  // 題型
  // =========================
  if (type === 0) {
    question = word.word;
    correct = word.meaning;
    pool = words.map(w => w.meaning);
  }

  else if (type === 1) {
    question = word.word;
    correct = word.reading;
    pool = words.map(w => w.reading);
  }

  else {
    question = word.reading;
    correct = word.word;
    pool = words.map(w => w.word);
  }

  // =========================
  // 選項處理
  // =========================
  let options = shuffle(pool).slice(0, 4);

  if (!options.includes(correct)) {
    options[0] = correct;
  }

  options = shuffle(options);

  currentAnswer = correct;

  // =========================
  // render
  // =========================
  q.innerText = question;
  c.innerHTML = "";

  options.forEach(opt => {

    const btn = document.createElement("button");

    btn.innerText = opt;

    btn.onclick = () => {
      r.innerText =
        opt === currentAnswer
          ? "✅ 正確"
          : "❌ 錯誤：" + currentAnswer;
    };

    c.appendChild(btn);
  });
}

// =========================
// 啟動
// =========================
loadWords();

</script>
</body>
